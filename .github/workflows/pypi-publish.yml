name: Publish Python distribution to PyPI and TestPyPI

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.github/**'
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.github/**'

jobs:
  verify-tag-branch-rule:
    name: Verify Tag Branch Rule
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check-rule.outputs.should_build }}
      publish_testpypi: ${{ steps.check-rule.outputs.publish_testpypi }}
      publish_pypi: ${{ steps.check-rule.outputs.publish_pypi }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Validate tag against branch rule
      id: check-rule
      run: |
        event_name="${{ github.event_name }}"
        tag_name="${{ github.ref_name }}"

        if [ "$event_name" = "pull_request" ]; then
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "publish_testpypi=false" >> "$GITHUB_OUTPUT"
          echo "publish_pypi=false" >> "$GITHUB_OUTPUT"
          echo "Allowed: pull request build only (no publish)."
          exit 0
        fi

        git fetch origin master --depth=1
        git fetch origin dev --depth=1

        on_master=false
        on_dev=false

        if git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
          on_master=true
        fi

        if git merge-base --is-ancestor "$GITHUB_SHA" "origin/dev"; then
          on_dev=true
        fi

        if [[ "$tag_name" == v* ]] && [[ "$on_master" == true ]]; then
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "publish_testpypi=false" >> "$GITHUB_OUTPUT"
          echo "publish_pypi=true" >> "$GITHUB_OUTPUT"
          echo "Allowed: v* tag on master (PyPI only)."
          exit 0
        fi

        if [[ "$on_dev" == true ]]; then
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "publish_testpypi=true" >> "$GITHUB_OUTPUT"
          echo "publish_pypi=false" >> "$GITHUB_OUTPUT"
          echo "Allowed: any tag on dev (TestPyPI only)."
          exit 0
        fi

        echo "should_build=false" >> "$GITHUB_OUTPUT"
        echo "publish_testpypi=false" >> "$GITHUB_OUTPUT"
        echo "publish_pypi=false" >> "$GITHUB_OUTPUT"
        echo "Blocked: event does not meet PR or tag branch rules."

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: verify-tag-branch-rule
    if: needs.verify-tag-branch-rule.outputs.should_build == 'true'

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v5
      with:
        name: python-package-distributions
        path: dist/

  publish-to-testpypi:
    name: >-
      Publish Python distribution to TestPyPI
    if: github.ref == 'refs/heads/dev'  # only publish to TestPyPI on dev branch pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyqi_api
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v6
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: >-
      Publish Python distribution to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyqi_api
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v6
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

